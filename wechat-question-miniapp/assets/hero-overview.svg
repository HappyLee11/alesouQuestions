<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="32" fill="#EEF4FF"/>
  <rect x="48" y="40" width="1104" height="640" rx="28" fill="white" stroke="#DBE7FB"/>
  <rect x="84" y="84" width="420" height="220" rx="28" fill="url(#g1)"/>
  <text x="120" y="150" fill="white" font-size="40" font-family="Arial" font-weight="700">阿乐搜题 · Demo Ready</text>
  <text x="120" y="198" fill="#DCEBFF" font-size="24" font-family="Arial">统一搜索、详情、后台治理与批量导入体验</text>
  <rect x="120" y="228" width="132" height="40" rx="20" fill="rgba(255,255,255,0.18)"/>
  <text x="146" y="253" fill="white" font-size="18" font-family="Arial">Mini Program</text>
  <rect x="540" y="84" width="280" height="104" rx="24" fill="#F8FBFF" stroke="#DBE7FB"/>
  <rect x="852" y="84" width="260" height="104" rx="24" fill="#F8FBFF" stroke="#DBE7FB"/>
  <rect x="540" y="204" width="572" height="100" rx="24" fill="#EFF6FF"/>
  <text x="572" y="142" fill="#0F172A" font-size="28" font-family="Arial" font-weight="700">搜索结果 + 筛选 + 分页</text>
  <text x="572" y="170" fill="#64748B" font-size="18" font-family="Arial">展示更像产品化搜题结果页，而不是简单列表。</text>
  <text x="884" y="142" fill="#0F172A" font-size="28" font-family="Arial" font-weight="700">后台治理</text>
  <text x="884" y="170" fill="#64748B" font-size="18" font-family="Arial">审核态、归档恢复、版本快照</text>
  <text x="572" y="246" fill="#0F172A" font-size="28" font-family="Arial" font-weight="700">导入链路：本地暂存 → 云端预检 → 正式导入</text>
  <text x="572" y="275" fill="#64748B" font-size="18" font-family="Arial">支持 JSON / JSONL / CSV / workbook manifest，多模板字段映射与去重策略。</text>
  <rect x="84" y="340" width="1028" height="292" rx="28" fill="#FBFDFF" stroke="#E2E8F0"/>
  <rect x="116" y="376" width="300" height="220" rx="24" fill="#FFFFFF" stroke="#DBE7FB"/>
  <rect x="450" y="376" width="300" height="220" rx="24" fill="#FFFFFF" stroke="#DBE7FB"/>
  <rect x="784" y="376" width="296" height="220" rx="24" fill="#FFFFFF" stroke="#DBE7FB"/>
  <text x="146" y="424" fill="#2563EB" font-size="22" font-family="Arial" font-weight="700">01 首页 / Landing</text>
  <text x="146" y="460" fill="#0F172A" font-size="28" font-family="Arial" font-weight="700">讲产品定位</text>
  <text x="146" y="495" fill="#64748B" font-size="18" font-family="Arial">一眼看出这是搜题 + 治理后台 Demo</text>
  <text x="480" y="424" fill="#2563EB" font-size="22" font-family="Arial" font-weight="700">02 Search / Detail</text>
  <text x="480" y="460" fill="#0F172A" font-size="28" font-family="Arial" font-weight="700">讲用户体验</text>
  <text x="480" y="495" fill="#64748B" font-size="18" font-family="Arial">关键词、高亮、分页、摘要、相关推荐</text>
  <text x="814" y="424" fill="#2563EB" font-size="22" font-family="Arial" font-weight="700">03 Admin / Import</text>
  <text x="814" y="460" fill="#0F172A" font-size="28" font-family="Arial" font-weight="700">讲治理能力</text>
  <text x="814" y="495" fill="#64748B" font-size="18" font-family="Arial">生命周期、审核流、导入预检与任务化数据</text>
