<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="32" fill="#EEF4FF"/>
  <rect x="48" y="40" width="1104" height="640" rx="28" fill="white" stroke="#DBE7FB"/>
  <rect x="84" y="84" width="1032" height="210" rx="28" fill="url(#g1)"/>
  <text x="122" y="152" fill="white" font-size="42" font-family="Arial" font-weight="700">阿乐搜题</text>
  <text x="122" y="202" fill="#DCEBFF" font-size="24" font-family="Arial">打开小程序后，先搜题，再按结果继续筛选和查看解析。</text>
  <rect x="122" y="230" width="520" height="42" rx="21" fill="rgba(255,255,255,0.94)"/>
  <text x="148" y="257" fill="#64748B" font-size="18" font-family="Arial">例如：HTTP 状态码 404 是什么</text>
  <rect x="666" y="230" width="128" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.24"/>
  <text x="710" y="257" fill="white" font-size="18" font-family="Arial">搜索</text>

  <rect x="84" y="328" width="504" height="286" rx="28" fill="#FBFDFF" stroke="#E2E8F0"/>
  <text x="118" y="382" fill="#2563EB" font-size="22" font-family="Arial" font-weight="700">首页</text>
  <text x="118" y="424" fill="#0F172A" font-size="30" font-family="Arial" font-weight="700">搜索框放在第一屏</text>
  <text x="118" y="462" fill="#64748B" font-size="18" font-family="Arial">热门搜索、最近搜索、按学科找题，用户打开就能开始使用。</text>
  <rect x="118" y="500" width="122" height="36" rx="18" fill="#E8F0FF"/>
  <text x="144" y="523" fill="#1D4ED8" font-size="16" font-family="Arial">热门搜索</text>
  <rect x="254" y="500" width="122" height="36" rx="18" fill="#E8F0FF"/>
  <text x="280" y="523" fill="#1D4ED8" font-size="16" font-family="Arial">最近搜索</text>
  <rect x="390" y="500" width="108" height="36" rx="18" fill="#E8F0FF"/>
  <text x="416" y="523" fill="#1D4ED8" font-size="16" font-family="Arial">按学科找题</text>

  <rect x="612" y="328" width="504" height="286" rx="28" fill="#FBFDFF" stroke="#E2E8F0"/>
  <text x="646" y="382" fill="#2563EB" font-size="22" font-family="Arial" font-weight="700">结果页</text>
  <text x="646" y="424" fill="#0F172A" font-size="30" font-family="Arial" font-weight="700">筛选、分页、解析更直接</text>
  <text x="646" y="462" fill="#64748B" font-size="18" font-family="Arial">保留用户真正需要的排序、筛选、答案摘要和详情入口，不再展示演示措辞。</text>
  <rect x="646" y="504" width="90" height="34" rx="17" fill="#F3F4F6"/>
  <text x="670" y="526" fill="#4B5563" font-size="16" font-family="Arial">学科</text>
  <rect x="750" y="504" width="90" height="34" rx="17" fill="#F3F4F6"/>
  <text x="774" y="526" fill="#4B5563" font-size="16" font-family="Arial">难度</text>
  <rect x="854" y="504" width="90" height="34" rx="17" fill="#F3F4F6"/>
  <text x="878" y="526" fill="#4B5563" font-size="16" font-family="Arial">题型</text>
  <rect x="958" y="504" width="90" height="34" rx="17" fill="#F3F4F6"/>
  <text x="982" y="526" fill="#4B5563" font-size="16" font-family="Arial">标签</text>

  <defs>
    <linearGradient id="g1" x1="84" y1="84" x2="1116" y2="294" gradientUnits="userSpaceOnUse">
      <stop stop-color="#123FA5"/>
      <stop offset="0.58" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>
</svg>
